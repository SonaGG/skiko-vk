name: Publish to FRST Cloud

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0). Leave empty to use SNAPSHOT from gradle.properties.'
        required: false
        default: ''
      release:
        description: 'Mark as release (true/false, affects -SNAPSHOT suffix)'
        required: false
        default: 'false'
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-frst-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────
  # macOS: primary publisher
  # Publishes ALL shared artifacts (skiko, skiko-awt, skiko-awt-runtime)
  # plus macOS/iOS/tvOS native and macOS AWT runtime JARs.
  # Must run before Windows and Linux so shared metadata is available.
  # ─────────────────────────────────────────────
  macos:
    name: 'macOS (primary)'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - name: 'Publish'
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ -n "${{ steps.version.outputs.version }}" ]]; then
            EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
          fi
          if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
            EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
          fi
          ./gradlew --no-daemon --stacktrace \
            -PawtEnabled=true \
            -Pskiko.native.enabled=true \
            -PfrstUsername="${{ secrets.FRST_USERNAME }}" \
            -PfrstPassword="${{ secrets.FRST_PASSWORD }}" \
            $EXTRA_ARGS \
            :skiko:publishToFrstCloud

  # ─────────────────────────────────────────────
  # Windows: platform-specific only
  # Publishes skiko-awt-runtime-windows-x64 and skiko-awt-runtime-windows-arm64.
  # ─────────────────────────────────────────────
  windows:
    name: 'Windows'
    runs-on: windows-2022
    needs: macos
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v1

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - name: 'Publish Windows AWT runtime JARs'
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ -n "${{ steps.version.outputs.version }}" ]]; then
            EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
          fi
          if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
            EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
          fi
          ./gradlew --no-daemon --stacktrace \
            -PawtEnabled=true \
            -PfrstUsername="${{ secrets.FRST_USERNAME }}" \
            -PfrstPassword="${{ secrets.FRST_PASSWORD }}" \
            $EXTRA_ARGS \
            :skiko:publishSkikoJvmRuntimeWindowsX64PublicationToFrstCloudRepository \
            :skiko:publishSkikoJvmRuntimeWindowsArm64PublicationToFrstCloudRepository

  # ─────────────────────────────────────────────
  # Linux: platform-specific only
  # Publishes Linux AWT runtime JARs + Linux native KMP targets.
  # ─────────────────────────────────────────────
  linux:
    name: 'Linux'
    runs-on: ubuntu-24.04
    needs: macos
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish Linux AWT runtime JARs + native'
        with:
          image_name: linux-compat
          command: |
            EXTRA_ARGS=""
            if [[ -n "${{ steps.version.outputs.version }}" ]]; then
              EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
            fi
            if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
            fi
            ./gradlew --no-daemon --stacktrace \
              -PawtEnabled=true \
              -Pskiko.native.linux.enabled=true \
              -PfrstUsername="${{ secrets.FRST_USERNAME }}" \
              -PfrstPassword="${{ secrets.FRST_PASSWORD }}" \
              $EXTRA_ARGS \
              :skiko:publishSkikoJvmRuntimeLinuxX64PublicationToFrstCloudRepository \
              :skiko:publishSkikoJvmRuntimeLinuxArm64PublicationToFrstCloudRepository \
              :skiko:publishLinuxX64PublicationToFrstCloudRepository \
              :skiko:publishLinuxArm64PublicationToFrstCloudRepository

  # ─────────────────────────────────────────────
  # Android
  # ─────────────────────────────────────────────
  android:
    name: 'Android'
    runs-on: ubuntu-24.04
    needs: macos
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish'
        with:
          image_name: linux-compat
          command: |
            EXTRA_ARGS=""
            if [[ -n "${{ steps.version.outputs.version }}" ]]; then
              EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
            fi
            if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
            fi
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.android.enabled=true \
              -PfrstUsername="${{ secrets.FRST_USERNAME }}" \
              -PfrstPassword="${{ secrets.FRST_PASSWORD }}" \
              $EXTRA_ARGS \
              :skiko:publishToFrstCloud

  # ─────────────────────────────────────────────
  # WebAssembly
  # ─────────────────────────────────────────────
  web:
    name: 'WebAssembly'
    runs-on: ubuntu-24.04
    needs: macos
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish'
        with:
          image_name: linux-emscripten-amd64
          command: |
            EXTRA_ARGS=""
            if [[ -n "${{ steps.version.outputs.version }}" ]]; then
              EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
            fi
            if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
            fi
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.wasm.enabled=true \
              -PfrstUsername="${{ secrets.FRST_USERNAME }}" \
              -PfrstPassword="${{ secrets.FRST_PASSWORD }}" \
              $EXTRA_ARGS \
              :skiko:publishToFrstCloud
