          echo "frstUsername=${{ secrets.FRST_USERNAME }}" >> ~/.gradle/gradle.properties
          echo "frstPassword=${{ secrets.FRST_PASSWORD }}" >> ~/.gradle/gradle.properties

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - name: 'Publish'
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ -n "${{ steps.version.outputs.version }}" ]]; then
            EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
          fi
          if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
            EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
          fi
          ./gradlew --no-daemon --stacktrace \
            -PawtEnabled=true \
            -Pskiko.native.enabled=true \
            $EXTRA_ARGS \
            :skiko:publishToFrstCloud

  # ─────────────────────────────────────────────
  # Android
  # ─────────────────────────────────────────────
  android:
    name: 'Android'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Inject FRST credentials'
        shell: bash
        run: |
          mkdir -p ~/.gradle
          echo "frstUsername=${{ secrets.FRST_USERNAME }}" >> ~/.gradle/gradle.properties
          echo "frstPassword=${{ secrets.FRST_PASSWORD }}" >> ~/.gradle/gradle.properties

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish'
        with:
