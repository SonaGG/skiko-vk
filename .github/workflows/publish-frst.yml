name: Publish to FRST Cloud

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0). Leave empty to use SNAPSHOT from gradle.properties.'
        required: false
        default: ''
      release:
        description: 'Mark as release (true/false, affects -SNAPSHOT suffix)'
        required: false
        default: 'false'
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-frst-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────
  # Windows: AWT (Windows x64 + arm64)
  # ─────────────────────────────────────────────
  windows:
    name: 'Windows (AWT)'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v1

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Inject FRST credentials'
        shell: bash
        run: |
          mkdir -p ~/.gradle
          echo "frstUsername=${{ secrets.FRST_USERNAME }}" >> ~/.gradle/gradle.properties
          echo "frstPassword=${{ secrets.FRST_PASSWORD }}" >> ~/.gradle/gradle.properties

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - name: 'Publish'
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ -n "${{ steps.version.outputs.version }}" ]]; then
            EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
          fi
          if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
            EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
          fi
          ./gradlew --no-daemon --stacktrace \
            -PawtEnabled=true \
            $EXTRA_ARGS \
            :skiko:publishToFrstCloud

  # ─────────────────────────────────────────────
  # Linux: AWT + Kotlin/Native Linux (x64 + arm64)
  # ─────────────────────────────────────────────
  linux:
    name: 'Linux (AWT + Native)'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-prerequisites

      - name: 'Inject FRST credentials'
        shell: bash
        run: |
          mkdir -p ~/.gradle
          echo "frstUsername=${{ secrets.FRST_USERNAME }}" >> ~/.gradle/gradle.properties
          echo "frstPassword=${{ secrets.FRST_PASSWORD }}" >> ~/.gradle/gradle.properties

      - name: 'Resolve version'
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE="true"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            RELEASE="${{ github.event.inputs.release }}"
          else
            VERSION=""
            RELEASE="false"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish'
        with:
          image_name: linux-compat
          command: |
            EXTRA_ARGS=""
            if [[ -n "${{ steps.version.outputs.version }}" ]]; then
              EXTRA_ARGS="-Pdeploy.version=${{ steps.version.outputs.version }}"
            fi
            if [[ "${{ steps.version.outputs.release }}" == "true" ]]; then
              EXTRA_ARGS="$EXTRA_ARGS -Pdeploy.release=true"
            fi
            ./gradlew --no-daemon --stacktrace \
              -PawtEnabled=true \
              -Pskiko.native.linux.enabled=true \
              $EXTRA_ARGS \
              :skiko:publishToFrstCloud

  # ─────────────────────────────────────────────
  # macOS: AWT + Kotlin/Native macOS / iOS / tvOS
  # ─────────────────────────────────────────────
  macos:
    name: 'macOS (AWT + Native)'
    runs-on: macos-15
    steps:
